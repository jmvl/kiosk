<!doctype html>
<html lang="fr-BE">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dr. Oetker Pizza Wheel Presentation</title>
<style>
  :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; background:#fff8ec; color:#3b1f12; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; overflow:hidden; }
  main { box-sizing:border-box; width:min(88vw, 980px); min-height:min(78vh, 760px); display:grid; place-items:center; align-content:center; gap:18px; text-align:center; padding:48px; border-radius:42px; background:radial-gradient(circle at 50% 42%, #ffe9b6 0 24%, #e85d35 25% 26%, #f8c96f 27% 49%, #2f7d32 50% 51%, #fff3d5 52% 100%); box-shadow:0 28px 90px #6b2a1326; }
  h1 { max-width:760px; margin:0; font-size:clamp(42px, 7vw, 92px); line-height:.9; letter-spacing:-0.06em; }
  p { max-width:680px; margin:0; font-size:clamp(18px, 2.5vw, 28px); }
  .wheel { --rotation:0deg; width:clamp(210px, 34vh, 340px); height:clamp(210px, 34vh, 340px); border-radius:50%; border:16px solid #d84624; background:conic-gradient(#f7d37f 0 45deg,#f9f0d6 45deg 90deg,#d84624 90deg 135deg,#f7d37f 135deg 180deg,#2f7d32 180deg 225deg,#f9f0d6 225deg 270deg,#d84624 270deg 315deg,#f7d37f 315deg 360deg); box-shadow:inset 0 0 0 18px #fff8ec, 0 18px 50px #6b2a132b; transform:rotate(var(--rotation)); transition:transform 3.8s cubic-bezier(.12,.7,.14,1); }
  .status { font-weight:900; color:#d84624; }
</style>
</head>
<body>
<main>
  <div id="wheel" class="wheel" aria-hidden="true"></div>
  <h1>Pizza Wheel</h1>
  <p id="status" class="status">Concours · Wedstrijd</p>
  <p id="helper">La question, le résultat et le ticket sont confirmés par le kiosque local.</p>
</main>
<script>
(() => {
  const protocol = 'retail-kiosk-package-bridge/v1';
  const wheel = document.getElementById('wheel');
  const status = document.getElementById('status');
  const helper = document.getElementById('helper');
  let wheelRotation = 0;
  parent.postMessage({ protocol, type: 'request', id: 'dr-oetker-loaded', method: 'recordTelemetry', payload: { event: 'package_loaded', package_id: 'dr-oetker-pizza-wheel' } }, '*');
  window.addEventListener('message', (event) => {
    const message = event.data || {};
    if (message.protocol !== protocol || message.type !== 'presentation') return;
    if (message.action === 'idle') {
      status.textContent = message.label || 'Concours · Wedstrijd';
      helper.textContent = 'Répondez à la question pour lancer la roue. · Beantwoord de vraag om het wiel te starten.';
      wheelRotation = 0;
      wheel.style.setProperty('--rotation', '0deg');
      return;
    }
    if (message.action === 'spin') {
      const segments = 6;
      const index = Number.isInteger(message.segmentIndex) ? message.segmentIndex : 0;
      const stop = 360 - ((index + 0.5) * (360 / segments));
      const current = ((wheelRotation % 360) + 360) % 360;
      const deltaToStop = (stop - current + 360) % 360;
      wheelRotation += 1440 + deltaToStop;
      wheel.style.setProperty('--rotation', wheelRotation + 'deg');
      status.textContent = message.label || 'Résultat confirmé';
      helper.textContent = 'La roue tourne… · Het wiel draait…';
    }
  });
})();
</script>
</body>
</html>
